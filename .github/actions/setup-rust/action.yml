name: Setup Rust
description: Install the stable Rust toolchain (run actions/checkout@v4 before this).

inputs:
  components:
    description: 'Comma-separated toolchain components (e.g. rustfmt, clippy)'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
