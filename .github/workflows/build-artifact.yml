name: build-artifact
on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-artifacts:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      BUILD_NAME: "blossom-${{ github.ref_name }}-${{ matrix.target }}"
    strategy:
      matrix:
        build: [linux-x64, linux-x64-musl, windows-x64, macos-x64, macos-arm64]
        include:
        - build: linux-x64
          os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          native: true
        - build: linux-x64-musl
          os: ubuntu-latest
          target: x86_64-unknown-linux-musl
          native: true
        - build: windows-x64
          os: windows-latest
          target: x86_64-pc-windows-msvc
          native: true
        - build: macos-x64
          os: macos-15-intel
          target: x86_64-apple-darwin
          native: true
        - build: macos-arm64
          os: macos-latest
          target: aarch64-apple-darwin
          native: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 50

    - name: Fetch tags
      run: git fetch --tags --force

    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
        key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cross
      uses: taiki-e/install-action@v2
      with:
        tool: cross

    - name: Build release binary
      run: cross build --verbose --release --locked --target ${{ matrix.target }} -p blossom-server -p blossom-cli

    - name: Bundle release (Unix)
      if: matrix.build != 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/blossom-server" "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/blossom-cli" "$BUILD_NAME/"

    - name: Bundle release (Windows)
      if: matrix.build == 'windows-x64'
      shell: bash
      run: |
        mkdir -p "$BUILD_NAME"
        cp README.md LICENSE "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/blossom-server.exe" "$BUILD_NAME/"
        cp "target/${{ matrix.target }}/release/blossom-cli.exe" "$BUILD_NAME/"

    - name: Run smoke test (Unix)
      if: matrix.native && matrix.build != 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/blossom-server" --version
        "$BUILD_NAME/blossom-cli" --version

    - name: Run smoke test (Windows)
      if: matrix.native && matrix.build == 'windows-x64'
      shell: bash
      run: |
        "$BUILD_NAME/blossom-server.exe" --version
        "$BUILD_NAME/blossom-cli.exe" --version

    - name: Upload asset
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BUILD_NAME }}
        path: ${{ env.BUILD_NAME }}
