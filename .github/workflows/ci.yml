name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Trusted CI — runs on self-hosted runner for pushes to master.
  ci-trusted:
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo clean
      - run: cargo fmt --all --check
      - run: cargo build --workspace --all-targets
      - run: cargo test --workspace
      - run: cargo test --features iroh-transport --test iroh_integration
      - run: cargo clippy --workspace -- -D warnings

  # PR CI — runs on GitHub-hosted runner for pull requests.
  ci-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo build --workspace --all-targets
      - run: cargo run -p blossom-cli -- -V
      - run: cargo run -p blossom-server -- -V
      - run: cargo test --workspace
      - run: cargo test --features iroh-transport --test iroh_integration
      - run: cargo clippy --workspace -- -D warnings

  # Feature matrix — verifies key feature combinations under pull requests.
  feature-matrix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: no-default
            flags: --no-default-features
          - label: client-only
            flags: --no-default-features --features client
          - label: client-filesystem
            flags: --no-default-features --features client,filesystem
          - label: lfs-only
            flags: --no-default-features --features lfs
          - label: server-only
            flags: --no-default-features --features server
          - label: default
            flags: ""
          - label: default-db-sqlite
            flags: --features db-sqlite
          - label: all-features
            flags: --all-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test (${{ matrix.label }})
        run: cargo test ${{ matrix.flags }}
