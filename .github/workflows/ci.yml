name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]
  workflow_call:
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ci-trusted
          - ci-pr
      targets:
        description: 'Cargo targets to build'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - lib
          - bins
          - tests
          - examples
          - benches

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Trusted CI — runs on self-hosted runner for pushes to master.
  ci-trusted:
    if: |
      github.repository == 'MonumentalSystems/blossom-rs' && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'ci-trusted'))
      )
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo clean
      - run: cargo fmt --all --check
      - name: Resolve build targets
        id: targets
        shell: bash
        run: |
          case "${{ inputs.targets || 'all' }}" in
            all)      echo "flag=--all-targets" >> "$GITHUB_OUTPUT" ;;
            *)        echo "flag=--${{ inputs.targets }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - run: cargo build --workspace ${{ steps.targets.outputs.flag }}
      - run: cargo test --workspace
      - run: cargo test --features iroh-transport --test iroh_integration
      - run: cargo clippy --workspace -- -D warnings

  # PR CI — runs on GitHub-hosted runners across OS matrix for pull requests.
  ci-pr:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_call' ||
      (github.event_name == 'workflow_dispatch' && (inputs.job == 'all' || inputs.job == 'ci-pr'))
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-15-intel, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo build --workspace --all-targets
      - run: cargo run -p blossom-cli -- -V
      - run: cargo run -p blossom-server -- -V
      - name: Resolve build targets
        id: targets
        shell: bash
        run: |
          case "${{ inputs.targets || 'all' }}" in
            all)      echo "flag=--all-targets" >> "$GITHUB_OUTPUT" ;;
            *)        echo "flag=--${{ inputs.targets }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - run: cargo build --workspace ${{ steps.targets.outputs.flag }}
      - run: cargo test --workspace
      - run: cargo test --features iroh-transport --test iroh_integration
      - run: cargo clippy --workspace -- -D warnings
