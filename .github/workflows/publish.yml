name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clean
      - run: cargo test --workspace

  publish-lib:
    needs: test
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p blossom-rs --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-server:
    needs: publish-lib
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish -p blossom-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-cli:
    needs: publish-lib
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sleep 30
      - run: cargo publish -p blossom-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
