name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo test --workspace

  publish-lib:
    needs: test
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/publish-crate
        with:
          package: blossom-rs
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-server:
    needs: publish-lib
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/publish-crate
        with:
          package: blossom-server
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          delay: '30'

  publish-cli:
    needs: publish-lib
    runs-on: self-hosted
    environment: crates-io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - uses: ./.github/actions/publish-crate
        with:
          package: blossom-cli
          token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          delay: '30'
