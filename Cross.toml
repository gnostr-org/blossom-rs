# Cross.toml — configuration for the `cross` cross-compilation tool.
# Installs system build dependencies inside the cross Docker containers
# before the Rust build begins, following the pattern used in gnostr/build.rs.
# See: https://github.com/cross-rs/cross#configuration

[build]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends pkg-config libssl-dev",
]

# GNU Linux x86_64 — dynamically linked OpenSSL is fine.
[target.x86_64-unknown-linux-gnu]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends pkg-config libssl-dev",
]

# musl Linux x86_64 — needs musl-tools and static OpenSSL.
[target.x86_64-unknown-linux-musl]
pre-build = [
    "apt-get update -qq",
    "apt-get install -y --no-install-recommends pkg-config libssl-dev musl-tools",
]

[target.x86_64-unknown-linux-musl.env]
# Pass through static-linking hints so openssl-sys uses static libs.
passthrough = [
    "OPENSSL_STATIC",
    "OPENSSL_LIB_DIR",
    "OPENSSL_INCLUDE_DIR",
]
