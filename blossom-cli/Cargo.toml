[package]
name = "blossom-cli"
version = "0.1.0"
edition = "2021"
description = "CLI client for Blossom blob storage servers"
license = "MIT"
publish = false

[dependencies]
blossom-rs = { path = "..", features = ["client"] }
clap = { version = "4", features = ["derive", "env"] }
tokio = { version = "1", features = ["full"] }
serde_json = "1.0"
reqwest = { version = "0.12", features = ["json"] }
hex = "0.4"
bech32 = "0.11"
